# Google Cloud Build — build and deploy to Cloud Run
#
# Required substitution variables (set in Cloud Build trigger or CLI):
#   _SERVICE_NAME  : Cloud Run service name  (e.g. ironpdf-landing)
#   _REGION        : Cloud Run region         (e.g. asia-southeast1)
#
# Usage (manual trigger):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _SERVICE_NAME=ironpdf-landing,_REGION=asia-southeast1

substitutions:
  _SERVICE_NAME: ironpdf-landing
  _REGION: asia-southeast1

steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA
      - --tag
      - gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest
      - --cache-from
      - gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest
      - .

  # Step 2: Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/$_SERVICE_NAME

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=CI_ENVIRONMENT=production

# Push final image as a build artifact
images:
  - gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA
  - gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
